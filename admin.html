<!DOCTYPE html>
<html>
<head>
<title>Ngondi Games Admin</title>
<style>
body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#222;
padding:30px;
border-radius:10px;
width:300px;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:10px;
background:red;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="box">
<h2>Admin Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script>
function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user==="admin" && pass==="ngondi123"){
window.location.href="dashboard.html";
}
else{
document.getElementById("msg").innerHTML="Wrong Username or Password";
}
}
</script>

</body>
</html>
