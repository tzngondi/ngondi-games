<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngondi Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
background:#111;
padding:20px;
text-align:center;
}

.logo{
font-size:40px;
font-weight:bold;
color:orange;
}

.slogan{
color:#ccc;
}

nav{
background:#1b1b1b;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:50px;
color:orange;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:orange;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:5px;
}

footer{
text-align:center;
padding:20px;
background:#111;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">NGONDI GAMES</div>
<div class="slogan">We Play Together, We Enjoy Together</div>
</header>

<nav>
<a href="#">Home</a>
<a href="#">PC Games</a>
<a href="#">Android</a>
<a href="#">PS4</a>
<a href="#">PS5</a>
</nav>

<section class="hero">
<h1>Welcome To Ngondi Games</h1>
<p>Best Games For PC, Android, PS4 & PS5</p>
</section>

<section class="games">

<div class="card">
<h2>GTA VI</h2>
<p>Latest Rockstar Game</p>
<a href="#" class="btn">View Game</a>
</div>

<div class="card">
<h2>EA FC 26</h2>
<p>Best Football Experience</p>
<a href="#" class="btn">View Game</a>
</div>

<div class="card">
<h2>Call Of Duty</h2>
<p>Action Shooter Game</p>
<a href="#" class="btn">View Game</a>
</div>

</section>

<footer>
© 2026 NGONDI GAMES
</footer>

</body>
</html>
